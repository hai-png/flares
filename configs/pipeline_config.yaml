# 3D Scene Reconstruction Pipeline Configuration
# ================================================

# ─── RF-DETR Settings ───────────────────────────────────────────
rfdetr:
  model_variant: "seg_medium"       # seg_nano|seg_small|seg_medium|seg_large|seg_xlarge|seg_2xlarge
  confidence_threshold: 0.5         # Detection confidence threshold
  max_detections: 50                # Max objects to detect per image
  coco_classes: true                # Use COCO pretrained classes

# ─── WildDet3D Settings ─────────────────────────────────────────
wilddet3d:
  checkpoint: "ckpt/wilddet3d_alldata_all_prompt_v1.0.pt"
  score_threshold: 0.3              # Combined 2D×3D score threshold
  score_3d_threshold: 0.1           # Standalone 3D confidence threshold
  prompt_mode: "geometric"          # geometric (one-to-one from 2D box)
  use_predicted_intrinsics: true    # Use predicted K for in-the-wild images
  canonical_rotation: true          # Normalize W≤L, yaw∈[0,π)

# ─── Hunyuan3D-2.1 Settings ─────────────────────────────────────
hunyuan3d:
  model_path: "tencent/Hunyuan3D-2.1"
  subfolder: "hunyuan3d-dit-v2-1"
  enable_flashvdm: true             # Use FlashVDM for fast volume decoding
  flashvdm_adaptive_kv: true       # Adaptive KV selection in cross-attention
  flashvdm_topk_mode: "mean"       # mean|merge
  num_inference_steps: 50          # Flow-matching denoising steps (5 if turbo)
  guidance_scale: 5.0              # Classifier-free guidance scale
  octree_resolution: 384           # Mesh resolution
  mc_algo: "dmc"                   # mc (standard) or dmc (differentiable)
  generate_texture: true           # Run texture generation stage
  texture_max_num_view: 6
  texture_resolution: 512
  texture_size: 4096
  realesrgan_ckpt: "hy3dpaint/ckpt/RealESRGAN_x4plus.pth"

# ─── MARCO Settings ─────────────────────────────────────────────
marco:
  checkpoint: "marco_release.pth"   # Or use torch.hub auto-download
  use_torch_hub: true               # Auto-download via torch.hub
  inference_res: 840                # Longest-side resolution for MARCO
  num_keypoints_per_object: 20      # Keypoints to sample per object for refinement

# ─── Pipeline Settings ──────────────────────────────────────────
pipeline:
  output_dir: "output/scene"
  device: "cuda"
  dtype: "float16"                  # float16|bfloat16|float32
  save_intermediate: true           # Save intermediate results
  render_resolution: 512            # Resolution for rendering 3D models
  refinement_iterations: 3          # Number of MARCO refinement iterations
  min_object_area: 100              # Min pixel area for an object mask to process
  background_color: [255, 255, 255] # Background color for masked crops
  low_vram_mode: false              # Auto-detected from GPU VRAM; set true to force conservative memory settings
  # When low_vram_mode=true (auto or manual), Hunyuan3D applies these overrides:
  #   octree_resolution: 256  (from 384)
  #   num_inference_steps: 30 (from 50)
  #   generate_texture: false (from true)
  # Override with --texture flag to re-enable textures in low VRAM mode.
